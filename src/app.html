<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary SEO -->
    <title>ML Visuals — Interactive Machine Learning Explainers</title>
    <meta name="description"
      content="Step-by-step visual explorations of machine learning algorithms. Learn KNN, Decision Trees, Naive Bayes and more — interactively, from first principles. No prior ML experience needed." />
    <meta name="keywords"
      content="machine learning visualization, interactive ML tutorial, KNN explained, k-nearest neighbors visualization, learn machine learning, ML explainer, interactive algorithm, data science education" />
    <meta name="author" content="ML Visuals" />
    <link rel="canonical" href="https://mlvisuals.io" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="ML Visuals" />
    <meta property="og:title"       content="ML Visuals — Interactive Machine Learning Explainers" />
    <meta property="og:description" content="Visual, interactive explorations of ML algorithms. Learn by doing — no prior experience needed." />
    <meta property="og:image"       content="https://mlvisuals.io/og-image.png" />
    <meta property="og:url"         content="https://mlvisuals.io" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ML Visuals — Interactive ML Explainers" />
    <meta name="twitter:description" content="Machine learning, made visible. Step-by-step interactive explainers for every major algorithm." />
    <meta name="twitter:image"       content="https://mlvisuals.io/og-image.png" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LearningResource",
      "name": "ML Visuals",
      "description": "Interactive visual explorations of machine learning algorithms — KNN, Decision Trees, Naive Bayes and more.",
      "url": "https://mlvisuals.io",
      "educationalLevel": "Beginner to Intermediate",
      "teaches": ["K-Nearest Neighbors","Decision Trees","Naive Bayes","Machine Learning","Data Science"],
      "inLanguage": "en",
      "isAccessibleForFree": true
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
